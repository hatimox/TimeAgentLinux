name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  package:
    name: Build packages (x86_64)
    # GTK 4.10+ required (gtk4 `v4_10` feature). 24.04 ships GTK 4.14.
    # Note: binaries link against this runner's glibc, so the produced packages
    # target reasonably recent distros; the .deb/.rpm declare their lib deps.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-4-dev libpulse-dev libsecret-1-dev libdbus-1-dev \
            rpm file desktop-file-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install packaging tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VER}"

      - name: Build release binary
        run: cargo build --release

      - name: Stage output dir
        run: mkdir -p dist

      # ---------- .deb ----------
      - name: Build .deb
        run: |
          cargo deb --no-build
          cp target/debian/*.deb dist/

      # ---------- .rpm ----------
      - name: Build .rpm
        run: |
          cargo generate-rpm --auto-req auto
          cp target/generate-rpm/*.rpm dist/

      # ---------- portable tarball ----------
      - name: Build portable tarball
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          STAGE="timeagent-${VER}-x86_64-linux"
          mkdir -p "$STAGE"
          cp target/release/timeagent "$STAGE/"
          cp README.md LICENSE "$STAGE/"
          cp -r packaging "$STAGE/"
          tar -czf "dist/${STAGE}.tar.gz" "$STAGE"

      # ---------- AppImage ----------
      - name: Build AppImage
        env:
          VER: ${{ steps.ver.outputs.version }}
          # GitHub runners lack FUSE; run the AppImage tools by extracting them.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          DEPLOY_GTK_VERSION: "4"
        run: |
          set -euo pipefail
          curl -fsSL -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o linuxdeploy-plugin-gtk.sh \
            https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy linuxdeploy-plugin-gtk.sh

          APPDIR=AppDir
          rm -rf "$APPDIR"
          install -Dm755 target/release/timeagent "$APPDIR/usr/bin/timeagent"
          install -Dm644 packaging/timeagent.desktop "$APPDIR/usr/share/applications/timeagent.desktop"
          install -Dm644 packaging/timeagent.svg \
            "$APPDIR/usr/share/icons/hicolor/scalable/apps/timeagent.svg"

          ./linuxdeploy --appdir "$APPDIR" --plugin gtk \
            -d packaging/timeagent.desktop \
            -i packaging/timeagent.svg \
            --output appimage
          mv TimeAgent*.AppImage "dist/TimeAgent-${VER}-x86_64.AppImage"

      # ---------- checksums ----------
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          ls -lh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: timeagent-packages
          path: dist/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
